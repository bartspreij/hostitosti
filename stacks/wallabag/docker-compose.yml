services:
  wallabag:
    image: wallabag/wallabag
    restart: unless-stopped
    env_file: 
      - ./configuration_wallabag.env
    volumes:
      - wallabag-images:/var/www/wallabag/web/assets/images
    networks:
      - proxy_network
      - wallabag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallabag.rule=Host(`wallabag.goochem.dev`)"
      - "traefik.http.routers.wallabag.entrypoints=websecure"
      - "traefik.http.routers.wallabag.tls.certresolver=cloudflare"
      - "traefik.http.services.wallabag.loadbalancer.server.port=80"
    depends_on:
      - wallabag_db
      - wallabag_cache

  wallabag_db:
    image: docker.io/postgres:17
    env_file:
      - ./configuration_wallabag.env
    volumes:
      - wallabag-db:/var/lib/postgresql/data
    networks:
      - wallabag_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wallabag"]
      interval: 10s
      start_period: 30s
    ports:
      - "5432:5432"

  wallabag_cache:
    image: redis:alpine
    restart: unless-stopped    
    networks:
      - wallabag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s

volumes:
  wallabag-images:
    external: true
  wallabag-db:


networks:
  wallabag_network:
  proxy_network:
    external: true


