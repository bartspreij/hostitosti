name: adguardhome

services:
  adguardhome:
    restart: unless-stopped
    image: adguard/adguardhome
    ports:
      - 53:53/tcp # plain dns over tcp
      - 53:53/udp # plain dns over udp
      - 3006:80/tcp # http web interface
      - 3005:3000/tcp # initial setup web interface
    volumes:
      - ./config:/opt/adguardhome/conf # app configuration
      - ./work:/opt/adguardhome/work # app working directory

volumes:
  config:
    driver: local
  work:
    driver: local

