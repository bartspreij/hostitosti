services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - "8096:8096"   # HTTP
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /data/media/tv
        target: /tv
      - type: bind
        source: /data/media/tv4k
        target: /tv4k
      - type: bind
        source: /data/media/movies
        target: /movies
      - type: bind
        source: /data/media/movies4k
        target: /movies4k
    restart: 'unless-stopped'
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.goochem.dev`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=myresolver"
      - "homepage.group=Media"
      - "homepage.name=Jellyfin"
      - "homepage.icon=jellyfin.png"
      - "homepage.href=https://jellyfin.goochem.dev"
      - "homepage.description=Media Server"


networks:
  proxy_network:
    external: true

